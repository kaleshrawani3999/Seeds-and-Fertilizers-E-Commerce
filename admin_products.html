<!DOCTYPE html>
<html>
<head>
<title>Admin Products</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4 md:p-10">

<h1 class="text-2xl md:text-3xl font-bold mb-6">Admin Products</h1>

<!-- Add Product Form -->

<div class="bg-white p-4 md:p-6 rounded shadow mb-10">

<h2 class="text-lg md:text-xl font-bold mb-4">Add Product</h2>

<form action="/admin/add_product" method="POST" class="space-y-4">

<input type="text" name="name" placeholder="Product Name"
class="w-full border p-3 rounded" required>

<input type="number" name="price" placeholder="Price"
class="w-full border p-3 rounded" required>

<input type="text" name="description" placeholder="Description"
class="w-full border p-3 rounded">

<input type="text" name="image" placeholder="Image URL"
class="w-full border p-3 rounded">

<button class="bg-green-600 text-white px-6 py-3 rounded hover:bg-green-800 w-full md:w-auto">
Add Product
</button>

</form>

</div>

<!-- DESKTOP TABLE -->

<div class="hidden md:block">

<table class="w-full bg-white shadow rounded overflow-hidden">

<tr class="bg-gray-200">
<th class="p-3">ID</th>
<th>Name</th>
<th>Price</th>
<th>Action</th>
</tr>

{% for product in products %}

<tr class="border-t text-center">

<td class="p-3">{{ product.id }}</td>
<td>{{ product.name }}</td>
<td>₹{{ product.price }}</td>

<td>

<a href="/admin/delete_product/{{ product.id }}"
class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-700">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

<!-- MOBILE PRODUCT CARDS -->

<div class="space-y-4 md:hidden">

{% for product in products %}

<div class="bg-white p-4 rounded shadow">

<p class="font-semibold">
ID: {{ product.id }}
</p>

<p class="text-lg font-bold mt-1">
{{ product.name }}
</p>

<p class="text-gray-600">
Price: ₹{{ product.price }}
</p>

<a href="/admin/delete_product/{{ product.id }}"
class="inline-block mt-3 bg-red-500 text-white px-4 py-2 rounded hover:bg-red-700">
Delete
</a>

</div>

{% endfor %}

</div>

</body>
</html>
