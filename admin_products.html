<!DOCTYPE html>
<html>
<head>
<title>Admin Products</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<h1 class="text-3xl font-bold mb-6">Admin Products</h1>

<!-- Add Product Form -->

<div class="bg-white p-6 rounded shadow mb-10">

<h2 class="text-xl font-bold mb-4">Add Product</h2>

<form action="/admin/add_product" method="POST" class="space-y-4">

<input type="text" name="name" placeholder="Product Name" class="w-full border p-2" required>

<input type="number" name="price" placeholder="Price" class="w-full border p-2" required>

<input type="text" name="description" placeholder="Description" class="w-full border p-2">

<input type="text" name="image" placeholder="Image URL" class="w-full border p-2">

<button class="bg-green-600 text-white px-6 py-2 rounded">
Add Product
</button>

</form>

</div>

<!-- Product Table -->

<table class="w-full bg-white shadow rounded">

<tr class="bg-gray-200">
<th class="p-3">ID</th>
<th>Name</th>
<th>Price</th>
<th>Action</th>
</tr>

{% for product in products %}

<tr class="border-t text-center">

<td class="p-3">{{ product.id }}</td>
<td>{{ product.name }}</td>
<td>₹{{ product.price }}</td>

<td>

<a href="/admin/delete_product/{{ product.id }}"
class="bg-red-500 text-white px-3 py-1 rounded">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
