<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Indumai Seeds & Dairymart</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2D5A27',
            secondary: '#F4A460',
            cream: '#FFF8DC'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-cream">

<!-- ================= NAVBAR ================= -->
<nav class="bg-primary text-white p-4 flex justify-between items-center">
  <a href="/" class="text-xl font-bold">Indumai Products</a>
  <div class="flex items-center gap-6">
    <a href="/" class="hover:text-secondary">Home</a>
    <a href="/about" class="hover:text-secondary">About</a>
    <a href="/products" class="text-white hover:text-secondary">Products</a>
    <a href="/gallery" class="hover:text-secondary">Gallery</a>
    <a href="/blog" class="hover:text-secondary">Blog</a>
    <a href="/contact" class="hover:text-secondary">Contact</a>
    <a href="/cart" class="text-xl">🛒</a>
  </div>
</nav>

<!-- ================= CATEGORY FILTER ================= -->
<div class="p-6 flex gap-4 justify-center flex-wrap bg-white">
  <button onclick="filterCategory('all')" class="px-4 py-2 bg-primary text-white rounded">All</button>
  <button onclick="filterCategory('seeds')" class="px-4 py-2 border rounded">Seeds</button>
  <button onclick="filterCategory('fertilizers')" class="px-4 py-2 border rounded">Fertilizers</button>
  <button onclick="filterCategory('dairy')" class="px-4 py-2 border rounded">Dairy</button>
  <button onclick="filterCategory('vegetables')" class="px-4 py-2 border rounded">Vegetables</button>
</div>

<!-- ================= PRODUCTS GRID ================= -->
<div id="products-container" class="grid md:grid-cols-3 gap-6 p-8"></div>

<!-- ================= JAVASCRIPT ================= -->
<script>
  const productsData = {{ products|tojson }};

  function renderProducts(data){
    const container = document.getElementById("products-container"); 
    container.innerHTML = "";

    data.forEach(product=>{
      container.innerHTML += `
        <div class="bg-white p-4 rounded shadow">
          <img src="${product.image}" class="h-40 w-full object-cover mb-4 rounded">
          <h3 class="font-bold text-lg">${product.name}</h3>
          <p class="text-green-700 font-semibold">₹${product.price}</p>

          <div class="flex gap-2 mt-3">
            <a href="/add_to_cart/${product.id}"
               class="bg-primary text-white px-4 py-2 rounded flex-1 text-center">
              Add to Cart
            </a>

            <form method="POST" action="/buy_now" class="flex-1">
              <input type="hidden" name="product_id" value="${product.id}">
              <input type="hidden" name="quantity" value="1">
              <button type="submit"
                class="bg-green-600 text-white px-4 py-2 rounded w-full hover:bg-green-800">
                Buy Now
              </button>
            </form>
          </div>
        </div>
      `;
    });
  }

  function filterCategory(category){
    if(category === "all"){
      renderProducts(productsData);
    } else {
      const filtered = productsData.filter(p=>p.category===category);
      renderProducts(filtered);
    }
  }

  const params = new URLSearchParams(window.location.search);
  const category = params.get("category");

  if(category){
    filterCategory(category);
  } else {
    renderProducts(productsData);
  }
</script>

</body>
</html>
