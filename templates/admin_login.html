<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Indumai</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-cream font-poppins flex items-center justify-center h-screen">

  <div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-sm">
    <h1 class="text-2xl font-bold text-primary mb-6 text-center">Admin Login</h1>

    {% with messages = get_flashed_messages() %}
{% if messages %}
<div class="mb-4">

{% for message in messages %}

<div class="bg-green-100 border border-green-400 text-green-700 px-4 py-2 rounded mb-2">
{{ message }}
</div>

{% endfor %}

</div>
{% endif %}
{% endwith %}

    <form method="POST" class="space-y-4">
      <input type="email" name="email" placeholder="Email"
             class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
      <input type="password" name="password" placeholder="Password"
             class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
      <button type="submit"
              class="w-full bg-primary text-white py-3 rounded-lg hover:bg-green-800 transition">
        Login
      </button>
    </form>
  </div>

</body>
</html>
