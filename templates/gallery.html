{% extends "base.html" %}

{% block title %}Gallery{% endblock %}

{% block content %}

<section class="py-16">

  <div class="max-w-6xl mx-auto px-6">

    <h1 class="text-4xl font-bold text-center text-primary mb-10">
      Our Farm Gallery
    </h1>

    <div class="grid grid-cols-2 md:grid-cols-3 gap-6">

      <img src="{{ url_for('static', filename='images/farm1.jpg') }}"
           class="w-full rounded-xl shadow-lg hover:scale-105 transition duration-300">

      <img src="{{ url_for('static', filename='images/farm2.jpg') }}"
           class="rounded-xl shadow-lg hover:scale-105 transition duration-300">

      <img src="{{ url_for('static', filename='images/farm3.jpg') }}"
           class="rounded-xl shadow-lg hover:scale-105 transition duration-300">

      <img src="{{ url_for('static', filename='images/farm4.jpg') }}"
           class="rounded-xl shadow-lg hover:scale-105 transition duration-300">

      <img src="{{ url_for('static', filename='images/farm5.jpg') }}"
           class="rounded-xl shadow-lg hover:scale-105 transition duration-300">

    </div>
  </div>

</section>
{% endblock %}
