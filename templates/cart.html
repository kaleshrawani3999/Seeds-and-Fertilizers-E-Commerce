<!doctype html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Cart - Indumai</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-4 md:p-10 font-sans">

<h1 class="text-3xl font-bold mb-6">Your Cart</h1>

{% if cart_items %}

<div class="bg-white p-6 rounded-lg shadow-md">

<!-- CART ITEMS -->

{% for item in cart_items %}

<div class="flex flex-col md:flex-row md:items-center md:justify-between bg-gray-50 p-4 rounded-lg mb-4 shadow-sm hover:shadow-md transition">

<!-- LEFT SIDE -->

<div class="flex items-center gap-4">

<!-- PRODUCT IMAGE -->

<img src="{{ item.image }}" 
class="w-20 h-20 object-cover rounded">

<!-- PRODUCT INFO -->

<div>

<h2 class="font-semibold text-lg">
{{ item.name }}
</h2>

<p class="text-sm text-gray-600 mt-1">
₹{{ item.price }} each
</p>

<!-- QUANTITY -->

<div class="flex items-center gap-3 mt-2">

<!-- DECREASE -->

<form method="POST" action="/update_cart">
<input type="hidden" name="product_id" value="{{ item.id }}">
<input type="hidden" name="action" value="decrease">

<button class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-400 font-bold">
-
</button>

</form>

<!-- QUANTITY -->

<span class="font-semibold">
{{ item.quantity }}
</span>

<!-- INCREASE -->

<form method="POST" action="/update_cart">
<input type="hidden" name="product_id" value="{{ item.id }}">
<input type="hidden" name="action" value="increase">

<button class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-400 font-bold">
+
</button>

</form>

</div>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="md:text-right mt-3 md:mt-0">

<p class="font-bold text-lg mb-2">
₹{{ item.price * item.quantity }}
</p>

<form method="POST" action="/update_cart">
<input type="hidden" name="product_id" value="{{ item.id }}">
<input type="hidden" name="action" value="remove">

<button class="text-red-500 text-sm hover:text-red-700 font-semibold">
Remove
</button>

</form>

</div>

</div>

{% endfor %}

<!-- TOTAL -->

<h2 class="text-2xl font-bold mt-6 text-right text-green-700">
Total: ₹{{ total }}
</h2>


<!-- CONTINUE SHOPPING -->

<a href="/products" class="btn btn-success">Continue Shopping</a>
{% endif %}
</body>
</html>
