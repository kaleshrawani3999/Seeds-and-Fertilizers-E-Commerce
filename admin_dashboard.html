<!doctype html>
<html>
<head>
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <div class="w-64 bg-blue-800 text-white p-6 space-y-6">

    <h2 class="text-2xl font-bold">Admin Panel</h2>
<nav class="space-y-4 mt-8">

<a href="{{ url_for('admin_dashboard') }}"
class="block px-4 py-2 rounded hover:bg-blue-600">
📊 Dashboard
</a>

<a href="{{ url_for('admin_orders') }}"
class="block px-4 py-2 rounded hover:bg-blue-600">
🛒 Orders
</a>
<a href="/admin/products"
class="bg-green-600 text-white px-4 py-2 rounded">
Manage Products
</a>
<a href="{{ url_for('admin_panel') }}"
class="block px-4 py-2 rounded hover:bg-blue-600">
💬 Contact Messages
</a>

<a href="{{ url_for('logout') }}"
class="block px-4 py-2 rounded hover:bg-red-600 bg-red-500">
🚪 Logout
</a>

</nav>
    </div>

  <!-- Main Content -->
  <div class="flex-1 p-8">

    <h1 class="text-3xl font-bold text-blue-700 mb-6">
      Welcome Admin 👋
    </h1>

    <!-- Dashboard Cards -->
    <div class="grid grid-cols-3 gap-6">

      <div class="bg-white p-6 rounded-lg shadow">
        <h2 class="text-xl font-semibold">Total Orders</h2>
        <p class="text-3xl font-bold text-blue-600 mt-2">
          {{ total_orders }}
        </p>
      </div>

      <div class="bg-white p-6 rounded-lg shadow">
        <h2 class="text-xl font-semibold">Total Products</h2>
        <p class="text-3xl font-bold text-green-600 mt-2">
          {{ total_products }}
        </p>
      </div>

      <div class="bg-white p-6 rounded-lg shadow">
        <h2 class="text-xl font-semibold">Total Users</h2>
        <p class="text-3xl font-bold text-purple-600 mt-2">
          {{ total_users }}
        </p>
      </div>

    </div>

  </div>

</div>

</body>
</html>
