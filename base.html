<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Indumai{% endblock %}</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'poppins': ['Poppins', 'sans-serif'],
            'playfair': ['Playfair Display', 'serif']
          },
          colors: {
            'primary': '#2D5A27',
            'secondary': '#F4A460',
            'cream': '#FFF8DC'
          }
        }
      }
    }
  </script>

  <!-- AOS Animation CSS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body class="bg-cream font-poppins">

<!-- NAVBAR -->
<nav class="bg-primary text-white relative z-50">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

    <div class="font-bold text-xl">
      Indumai Seeds & Dairymart
    </div>

    <div class="hidden md:flex space-x-8 font-medium">
      <a href="/" class="hover:text-secondary transition">Home</a>
      <a href="/about" class="hover:text-secondary transition">About</a>
      <a href="/products" class="hover:text-secondary transition">Products</a>
      <a href="/gallery" class="hover:text-secondary transition">Gallery</a>
      <a href="/blog" class="hover:text-secondary transition">Blog</a>
      <a href="/contact" class="hover:text-secondary transition">Contact</a>
    </div>

    <!-- Hamburger -->
    <button id="menu-btn" class="md:hidden text-3xl focus:outline-none">
      ☰
    </button>

  </div>

  </nav>
<!-- PAGE CONTENT -->
{% block content %}{% endblock %}

<!-- AOS Script -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const btn = document.getElementById("menu-btn");
  const menu = document.getElementById("mobile-menu");

  if(btn && menu){
    btn.addEventListener("click", function(){
      menu.classList.toggle("hidden");
    });
  }
});
</script>
</body>
</html>
